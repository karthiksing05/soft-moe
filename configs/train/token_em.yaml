# Token-only EM on a FROZEN (already-trained) backbone. Stage B of the sequential regime:
# the LLM is fixed; only the expert tokens + router are fit by soft-EM. Tokens want a high LR.
train:
  max_steps: 8000
  batch_size: 16
  grad_accum: 1
  grad_clip: 1.0
  eval_every: 2000
  log_every: 500
  keep_last: 1
  em: { mode: soft, reassign_every: 0 }
  lambdas: { sep: 1.0, balance: 0.1, route: 0.5 }
  optimizer: { name: adamw, lr: 1.0e-2, wd: 0.0 }
  scheduler: cosine
  wandb: { enabled: false }
