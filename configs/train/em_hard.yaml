# Hard EM with periodic likelihood-based reassignment (c-BTM-flavored discovery loop).
train:
  max_steps: 80
  batch_size: 8
  grad_accum: 1
  grad_clip: 1.0
  eval_every: 40
  log_every: 10
  keep_last: 1
  em: { mode: hard, reassign_every: 40, reassign_batches: 4, reassign_steps: 1 }
  lambdas: { sep: 1.0, balance: 0.2, route: 0.5 }
  optimizer: { name: adamw, lr: 1.0e-3, wd: 0.0 }
  scheduler: cosine
  wandb: { enabled: false }
