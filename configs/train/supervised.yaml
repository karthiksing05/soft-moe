# Supervised routing (E-step = ground-truth label). No load-balance/route terms needed.
train:
  max_steps: 80
  batch_size: 8
  grad_clip: 1.0
  eval_every: 40
  log_every: 10
  keep_last: 1
  em: { mode: soft, reassign_every: 0 }
  lambdas: { sep: 0.5, balance: 0.0, route: 0.0 }
  optimizer: { name: adamw, lr: 1.0e-3, wd: 0.0 }
  scheduler: cosine
  wandb: { enabled: false }
