# Alternating (block-coordinate) M-step: train the LLM (backbone θ) for a block of steps, then
# fine-tune the expert tokens for a block, then back to the LLM, etc. Requires a trainable
# backbone (model.backbone_mode: full). Backbone and tokens get separate optimizers + LRs.
train:
  max_steps: 2000
  batch_size: 8
  grad_accum: 2
  grad_clip: 1.0
  eval_every: 500
  log_every: 100
  keep_last: 1
  em: { mode: soft, reassign_every: 0 }
  lambdas: { sep: 1.0, balance: 0.1, route: 0.5 }
  alternation:
    enabled: true
    start: backbone           # train the LLM first
    backbone_steps: 200       # θ-phase block length
    token_steps: 200          # expert-token-phase block length
    backbone_lr: 5.0e-5       # LLM wants a small LR
    token_lr: 1.0e-2          # tokens want a high LR
  scheduler: cosine
  wandb: { enabled: false }
