# Toy-on-real-data variant of the headline method: tiny random backbone over the toy HF corpus.
# Demonstrates the gpt2-tokenizer + tiny-backbone path end-to-end (still a smoke config, not M7).
defaults: [/data/toy, /model/backbone_tiny, /train/em_soft, /eval/default]
meta: { name: ours_unsup_toy, regime: ours_unsup }
model:
  method: softmoe
  backbone_mode: frozen
  injection: prefix
  expert_tokens: { n_experts: auto, tokens_per_expert: 1, init: from_cluster_centroids, trainable: true }
  router: { kind: soft, top_k: 1, pool: meanhidden }
  router_supervise_with: cluster
seed: 0
