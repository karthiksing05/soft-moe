# Ours (supervised routing by domain, alternating) at Dense-1x compute — the upper bound for ours.
defaults: [/data/dev_bytes, /train/from_scratch_alt, /eval/default]
meta: { name: cmm_ours_sup_alt, regime: ours_sup_alt }
model:
  method: softmoe
  backbone_mode: full
  injection: prefix
  backbone: { kind: tiny, tiny: { n_embd: 256, n_layer: 6, n_head: 8, n_inner: 256, n_positions: 512 } }
  expert_tokens: { n_experts: auto, tokens_per_expert: 4, init: from_cluster_centroids, trainable: true }
  router: { kind: supervised, route_by: domain }
  router_supervise_with: domain
seed: 0
