# M7 core-subset: Ours (supervised) — frozen pythia-160m + learned expert tokens, cluster-routed.
defaults: [/data/dev, /model/backbone_pythia160m, /train/supervised, /eval/default]
meta: { name: ours_sup_dev, regime: ours_sup }
data: { tokenizer: EleutherAI/pythia-160m }
model:
  method: softmoe
  backbone_mode: frozen
  injection: prefix
  expert_tokens: { n_experts: auto, tokens_per_expert: 4, init: from_cluster_centroids, trainable: true }
  router: { kind: supervised, route_by: cluster }
  router_supervise_with: cluster
train: { max_steps: 2000, batch_size: 8, grad_accum: 2, eval_every: 500, log_every: 100, keep_last: 1, optimizer: { name: adamw, lr: 1.0e-2, wd: 0.0 } }
seed: 0
