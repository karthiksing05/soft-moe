# M7: Hard MoE baseline on dev corpus — token-routed MoE FFN over pretrained pythia-160m,
# experts sparse-upcycled from the dense FFN. K=5 to mirror the 5 domains. The "true MoE" upper
# reference that *adds parameters* (the cost our prompt-carried experts avoid).
defaults: [/data/dev, /model/backbone_pythia160m, /train/supervised, /eval/default]
meta: { name: hard_moe_dev, regime: hard_moe }
data: { tokenizer: EleutherAI/pythia-160m }
model:
  method: hard_moe
  backbone_mode: full
  hard_moe: { n_experts: 5, top_k: 1 }
train: { max_steps: 2000, batch_size: 8, grad_accum: 2, eval_every: 500, log_every: 100, keep_last: 1, lambdas: { sep: 0.0, balance: 0.01, route: 0.0 }, optimizer: { name: adamw, lr: 5.0e-5, wd: 0.0 } }
seed: 0
