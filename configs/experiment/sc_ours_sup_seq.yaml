# Ours sup + sequential (pretrain sc_dense1x, then warm-alt). T=1. Use --init-backbone-from sc_dense1x.
defaults: [/data/demix8, /train/sc_warm_alt, /eval/default]
meta: { name: sc_ours_sup_seq, regime: ours_sup_seq }
model:
  method: softmoe
  backbone_mode: full
  injection: prefix
  backbone: { kind: tiny, tiny: { n_embd: 512, n_layer: 8, n_head: 8, n_inner: 2048, n_positions: 576 } }
  expert_tokens: { n_experts: auto, tokens_per_expert: 1, init: from_cluster_centroids, trainable: true }
  router: { kind: supervised, route_by: domain }
  router_supervise_with: domain
seed: 0
