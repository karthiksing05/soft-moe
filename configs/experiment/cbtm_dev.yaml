# M7 core-subset: c-BTM baseline — N separate pythia-160m experts (one per cluster).
defaults: [/data/dev, /model/backbone_pythia160m, /train/supervised, /eval/default]
meta: { name: cbtm_dev, regime: cbtm }
data: { tokenizer: EleutherAI/pythia-160m }
model:
  method: cbtm
  n_clusters: auto
  route_by: cluster
train: { max_steps: 2000, batch_size: 8, grad_accum: 2, eval_every: 500, log_every: 100, keep_last: 1, lambdas: { sep: 0.0, balance: 0.0, route: 0.0 }, optimizer: { name: adamw, lr: 5.0e-5, wd: 0.0 } }
seed: 0
