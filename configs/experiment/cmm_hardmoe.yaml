# Hard-MoE, learned top-1 routing. ~Dense-1x active, ~Dense-5x capacity. Not upcycled (from scratch).
defaults: [/data/dev_bytes, /train/from_scratch, /eval/default]
meta: { name: cmm_hardmoe, regime: hard_moe }
model:
  method: hard_moe
  backbone_mode: full
  backbone: { kind: tiny, tiny: { n_embd: 256, n_layer: 6, n_head: 8, n_inner: 256, n_positions: 576 } }
  hard_moe: { n_experts: 5, top_k: 1, upcycle: false }
  load_balance_kind: switch
train: { lambdas: { sep: 0.0, balance: 0.05, route: 0.0 } }
seed: 0
