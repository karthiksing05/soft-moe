# Thesis Phase B — frozen backbone, optimise ONLY the expert tokens (warm-started from
# the Phase-A run via --init-backbone-from, which also carries the frozen tokens forward).
defaults: [/data/demix8, /train/sc_phaseB, /eval/default]
meta: { name: sw_ours_d384_s0, regime: ours_d384 }
model:
  method: softmoe
  backbone_mode: frozen
  injection: prefix
  backbone: { kind: tiny, tiny: { n_embd: 384, n_layer: 6, n_head: 8, n_inner: 1536, n_positions: 576 } }
  expert_tokens: { n_experts: auto, tokens_per_expert: 1, init: random, trainable: true }
  router: { kind: supervised, route_by: domain }
  router_supervise_with: domain
train: { max_steps: 6000, eval_every: 1500 }
seed: 0
