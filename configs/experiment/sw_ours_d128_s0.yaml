defaults: [/data/demix8, /train/sc_alt, /eval/default]
meta: { name: sw_ours_d128_s0, regime: ours_d128 }
model:
  method: softmoe
  backbone_mode: full
  injection: prefix
  backbone: { kind: tiny, tiny: { n_embd: 128, n_layer: 4, n_head: 4, n_inner: 512, n_positions: 576 } }
  expert_tokens: { n_experts: auto, tokens_per_expert: 1, init: from_cluster_centroids, trainable: true }
  router: { kind: supervised, route_by: domain }
  router_supervise_with: domain
train: { max_steps: 20000, eval_every: 5000 }
seed: 0
