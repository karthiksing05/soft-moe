# Ours (unsup, alternating) at Dense-1x compute: small backbone + EM-discovered expert tokens.
defaults: [/data/dev_bytes, /train/from_scratch_alt, /eval/default]
meta: { name: cmm_ours_unsup_alt, regime: ours_unsup_alt }
model:
  method: softmoe
  backbone_mode: full
  injection: prefix
  backbone: { kind: tiny, tiny: { n_embd: 256, n_layer: 6, n_head: 8, n_inner: 256, n_positions: 512 } }
  expert_tokens: { n_experts: auto, tokens_per_expert: 4, init: from_cluster_centroids, trainable: true }
  router: { kind: soft, top_k: 1, pool: meanhidden }
  router_supervise_with: cluster
seed: 0
