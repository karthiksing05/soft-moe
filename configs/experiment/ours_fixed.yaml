# Ablation: Ours with FIXED orthogonal-constant tokens (isolates whether *learning* tokens helps).
# Identical to ours_unsup except expert_tokens.trainable=false; the learned router still adapts.
defaults: [/data/synth, /model/backbone_tiny, /train/em_soft, /eval/default]
meta: { name: ours_fixed, regime: ours_fixed }
model:
  method: softmoe
  backbone_mode: frozen
  injection: prefix
  expert_tokens: { n_experts: auto, tokens_per_expert: 1, init: orthogonal, trainable: false }
  router: { kind: soft, top_k: 1, pool: meanhidden }
  router_supervise_with: cluster
seed: 0
