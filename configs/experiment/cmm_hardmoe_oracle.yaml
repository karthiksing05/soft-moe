# Hard-MoE with ORACLE domain routing (each token -> its domain's FFN expert). Isolates the
# capacity/specialization benefit from router-learnability. ~Dense-1x active, ~Dense-5x capacity.
defaults: [/data/dev_bytes, /train/from_scratch, /eval/default]
meta: { name: cmm_hardmoe_oracle, regime: hard_moe_oracle }
model:
  method: hard_moe
  backbone_mode: full
  backbone: { kind: tiny, tiny: { n_embd: 256, n_layer: 6, n_head: 8, n_inner: 256, n_positions: 512 } }
  hard_moe: { n_experts: 5, top_k: 1, upcycle: false, route_by: domain }
seed: 0
