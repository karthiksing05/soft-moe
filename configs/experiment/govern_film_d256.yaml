# FFN-governance arm (film_ffn), Phase B: freeze backbone+hypernet, fit ONLY the expert
# latents e_k. Warm-start govern_seqA_film_d256 (carries backbone+governor+tokens).
defaults: [/data/demix8, /train/sc_phaseB, /eval/default]
meta: { name: govern_film_d256, regime: govern_film_d256 }
model:
  method: softmoe
  backbone_mode: frozen
  injection: film_ffn
  governor_rank: 16
  backbone: { kind: tiny, tiny: { n_embd: 256, n_layer: 6, n_head: 8, n_inner: 1024, n_positions: 576 } }
  expert_tokens: { n_experts: auto, tokens_per_expert: 1, init: random, trainable: true }
  router: { kind: supervised, route_by: domain }
  router_supervise_with: domain
train: { max_steps: 6000, eval_every: 2000 }
seed: 0
