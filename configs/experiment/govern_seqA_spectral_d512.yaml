# Phase A for spectral FFN-governance at d512 (matches dense_1x 30k): backbone+hypernet train,
# expert latents present-but-FROZEN (random).
defaults: [/data/demix8, /train/sc_dense, /eval/default]
meta: { name: govern_seqA_spectral_d512, regime: seqA_spectral_d512 }
model:
  method: softmoe
  backbone_mode: full
  injection: spectral_ffn
  governor_rank: 16
  backbone: { kind: tiny, tiny: { n_embd: 512, n_layer: 8, n_head: 8, n_inner: 2048, n_positions: 576 } }
  expert_tokens: { n_experts: auto, tokens_per_expert: 1, init: random, trainable: false }
  router: { kind: supervised, route_by: domain }
  router_supervise_with: domain
train: { max_steps: 30000, eval_every: 6000 }
seed: 0
