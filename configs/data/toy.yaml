# Toy recipe: tiny slices of 3 clearly-distinct real HF datasets (needs network at build time).
# CPU smoke target. Uses the gpt2 tokenizer (small download) with a tiny random backbone.
data:
  recipe: toy
  block_size: 128
  tokenizer: gpt2
  embedding_method: tfidf            # set to 'sentence' with softmoe[embed] for stronger clusters
  clusterer:
    kind: kmeans
    n_clusters: 3
  domains:
    - { name: wiki,    source: hf, hf_path: wikitext, hf_config: wikitext-2-raw-v1, split: train, text_field: text,    max_docs: 500, min_chars: 128 }
    - { name: news,    source: hf, hf_path: ag_news,                                 split: train, text_field: text,    max_docs: 500, min_chars: 64 }
    - { name: reviews, source: hf, hf_path: imdb,                                    split: train, text_field: text,    max_docs: 500, min_chars: 128 }
  splits: { train: 0.8, val: 0.1, test: 0.1 }
