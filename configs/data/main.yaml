# Main / headline recipe (M7): c-BTM-style. Mirror their setup — k-means clusters of C4 (and/or
# S2ORC) so Ours vs c-BTM is apples-to-apples (same partition, single model vs N models).
# This is a GPU/cluster run; build on the MPCDF clusters via the HPC skills, not on a laptop.
data:
  recipe: main
  block_size: 1024
  tokenizer: gpt2
  embedding_method: sentence
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  clusterer:
    kind: kmeans
    n_clusters: 16              # c-BTM goes up to 128; keep configurable
    subsample: 100000
  domains:
    # A single broad-domain source clustered into n_clusters "discovered" domains (c-BTM recipe).
    - { name: c4, source: hf, hf_path: allenai/c4, hf_config: en, split: train, text_field: text, max_docs: 500000, min_chars: 256 }
  splits: { train: 0.95, val: 0.025, test: 0.025 }
